<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One SIOMAi POS V2</title>
<meta name="theme-color" content="#FF6B35">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
body { background: #f5f5f5; padding-bottom: 20px; padding-top: 60px; }
.header { background: #FF6B35; color: white; padding: 12px; text-align: center; font-size: 18px; font-weight: bold; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
.summary { background: #FF8C42; color: white; margin: 8px; padding: 12px; border-radius: 8px; }
.summary-row { display: flex; justify-content: space-between; margin: 3px 0; font-size: 14px; }
.summary-net { font-size: 16px; font-weight: bold; border-top: 1px solid white; padding-top: 4px; margin-top: 4px; }
.btn-small { background: white; color: #FF6B35; border: none; padding: 6px 10px; border-radius: 5px; margin: 2px; cursor: pointer; font-size: 12px; }
.card { background: white; margin: 8px; padding: 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.card h3 { font-size: 16px; margin-bottom: 8px; }
.btn { background: #FF6B35; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; }
.btn:active { background: #E55A2B; }
input, select { padding: 6px; border: 1px solid #ddd; border-radius: 5px; margin: 3px; font-size: 14px; width: 100%; }
.category-tabs { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 4px; }
.cat-btn { background: #eee; border: none; padding: 6px 12px; border-radius: 15px; white-space: nowrap; cursor: pointer; font-size: 12px; }
.cat-btn.active { background: #FF6B35; color: white; }
.stock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; max-height: 400px; overflow-y: auto; }
.stock-item { border: 1px solid #ddd; padding: 6px; border-radius: 6px; background: #fafafa; text-align: center; }
.stock-item-name { font-size: 10px; font-weight: 600; margin-bottom: 2px; height: 24px; display: flex; align-items: center; justify-content: center; }
.stock-item-price { font-size: 12px; font-weight: bold; color: #FF6B35; margin: 2px 0; }
.stock-item-qty { font-size: 11px; color: #666; margin-bottom: 3px; }
.stock-input { width: 100%; padding: 3px; text-align: center; border: 1px solid #ddd; border-radius: 3px; font-size: 10px; margin-bottom: 3px; }
.price-input { width: 100%; padding: 3px; text-align: center; border: 1px solid #FF9800; border-radius: 3px; font-size: 10px; margin-bottom: 3px; background: white; }
.btn-group { display: flex; }
.btn-production { background: #2196F3; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 9px; width: 48%; margin-top: 3px; }
.btn-price { background: #FF9800; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 9px; width: 48%; margin-top: 3px; margin-left: 4%; }
.input-label { font-size: 10px; color: #666; margin-left: 3px; margin-bottom: 5px; }
.log-item { border: 1px solid #eee; padding: 5px; margin: 3px 0; border-radius: 4px; font-size: 11px; }
.log-item-name { font-weight: bold; }
.waste-text { color: #FF9800; font-weight: bold; }
.wrapper-text { color: #2196F3; font-weight: bold; }
</style>
</head>
<body>
<div class="header">🥟 One SIOMAi POS V2</div>

<div class="summary">
<div class="summary-row"><span>Sales:</span><span>₱<span id="sales">0.00</span></span></div>
<div class="summary-row"><span>Expenses:</span><span>₱<span id="expenses">0.00</span></span></div>
<div class="summary-row"><span>Items Sold:</span><span><span id="itemsSold">0</span> pcs</span></div>
<div class="summary-row"><span>Transactions:</span><span id="transCount">0</span></div>
<div class="summary-row summary-net"><span>Net:</span><span>₱<span id="net">0.00</span></span></div>
<button class="btn-small" onclick="resetDay()">Reset Day</button>
<button class="btn-small" onclick="loadDefaults()">📥 Load Defaults</button>
</div>

<div class="card">
<h3>📦 Stock + Daily Production + Price Edit</h3>
<div class="category-tabs" id="stockCategoryTabs">
<button class="cat-btn active" onclick="filterStockCategory('All',this)">All</button>
<button class="cat-btn" onclick="filterStockCategory('65\'s',this)">65's</button>
<button class="cat-btn" onclick="filterStockCategory('30\'s',this)">30's</button>
<button class="cat-btn" onclick="filterStockCategory('BIG SIOMAI',this)">BIG</button>
<button class="cat-btn" onclick="filterStockCategory('DUMPLINGS',this)">DUMPLINGS</button>
<button class="cat-btn" onclick="filterStockCategory('SIOPAO',this)">SIOPAO</button>
<button class="cat-btn" onclick="filterStockCategory('EXTRAS',this)">EXTRAS</button>
</div>
<div id="productionList" class="stock-grid"></div>
</div>

<div class="card">
<h3>📅 Daily Production Log</h3>
<div style="display:flex;flex-wrap:wrap;">
<div style="width:48%;margin-right:4%;">
<input id="prodDate" type="date" style="width:100%">
<div class="input-label">Date</div>
</div>
<div style="width:48%;">
<select id="prodProduct" style="width:100%">
<option value="">Select Product</option>
</select>
<div class="input-label">Product</div>
</div>
<div style="width:48%;margin-right:4%;">
<input id="prodQty" type="number" placeholder="500" style="width:100%">
<div class="input-label">Qty Produced (pcs)</div>
</div>
<div style="width:48%;">
<input id="prodWaste" type="number" placeholder="5" style="width:100%">
<div class="input-label">Waste (grams) - Record only</div>
</div>
<div style="width:48%;margin-right:4%;">
<input id="prodWrapper" type="number" placeholder="1750" style="width:100%">
<div class="input-label">Wrapper Used (grams)</div>
</div>
<div style="width:48%;">
<input id="prodDesc" placeholder="Luto ni Juan" style="width:100%">
<div class="input-label">Notes</div>
</div>
</div>
<button class="btn" onclick="addProductionLog()" style="width:100%;margin-top:8px;">+ Log Production</button>

<div style="margin-top:10px;max-height:200px;overflow-y:auto;border-top:1px solid #ddd;padding-top:8px;">
<div style="font-weight:bold;font-size:12px;margin-bottom:5px;">Today's Logs:</div>
<div id="productionLogsList"></div>
</div>
</div>

<script>
// EMERGENCY: FORCE LOAD PRODUCTS - NO LOCALSTORAGE CHECK
var products = [
  {id:1,name:'Pork 65\'s',price:160,stock:602,cat:'65\'s'},
  {id:2,name:'Chicken 65\'s',price:150,stock:100,cat:'65\'s'},
  {id:3,name:'Beef 65\'s',price:150,stock:100,cat:'65\'s'},
  {id:5,name:'Pork 30\'s',price:80,stock:93,cat:'30\'s'},
  {id:6,name:'Chicken 30\'s',price:80,stock:100,cat:'30\'s'},
  {id:7,name:'Beef 30\'s',price:80,stock:100,cat:'30\'s'},
  {id:8,name:'Pork Big Siomai',price:120,stock:86,cat:'BIG SIOMAI'},
  {id:9,name:'Chicken Big Siomai',price:120,stock:100,cat:'BIG SIOMAI'},
  {id:10,name:'Beef Big Siomai',price:120,stock:100,cat:'BIG SIOMAI'},
  {id:11,name:'Japanese Big Siomai',price:150,stock:100,cat:'BIG SIOMAI'},
  {id:12,name:'Sharksfin',price:110,stock:92,cat:'DUMPLINGS'},
  {id:13,name:'Gyoza',price:110,stock:100,cat:'DUMPLINGS'},
  {id:14,name:'Hakaw',price:280,stock:20,cat:'DUMPLINGS'},
  {id:27,name:'Jumbo Asado',price:200,stock:50,cat:'SIOPAO'},
  {id:19,name:'Chili Garlic',price:75,stock:999,cat:'EXTRAS'},
  {id:28,name:'Siopao Sauce',price:0,stock:999,cat:'EXTRAS'},
  {id:29,name:'Water',price:50,stock:100,cat:'EXTRAS'},
  {id:30,name:'MINI SIOPAO',price:200,stock:100,cat:'EXTRAS'},
  {id:31,name:'Mini Bola Bola',price:209,stock:100,cat:'EXTRAS'},
  {id:32,name:'Mini ASADO',price:200,stock:100,cat:'EXTRAS'}
];

var productionLogs = [];
var currentStockFilter = 'All';

alert('V2 LOADED! 20 products dapat meron na.');

function loadDefaults(){
  alert('Products loaded na! Check mo Stock box sa taas.');
  renderProduction();
  populateProductDropdown();
}

function saveData(){
  localStorage.setItem('products',JSON.stringify(products));
  localStorage.setItem('productionLogs',JSON.stringify(productionLogs));
}

function filterStockCategory(cat,el){
  currentStockFilter = cat;
  var tabs = document.getElementById('stockCategoryTabs').getElementsByClassName('cat-btn');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  el.classList.add('active');
  renderProduction();
}

function renderProduction(){
  var filtered = currentStockFilter==='All'? products : products.filter(function(p){return p.cat===currentStockFilter});
  var html = '';
  for(var i=0;i<filtered.length;i++){
    var p = filtered[i];
    html += '<div class="stock-item">';
    html += '<div class="stock-item-name">'+p.name+'</div>';
    html += '<div class="stock-item-price">₱'+p.price+'</div>';
    html += '<div class="stock-item-qty">Stock: '+p.stock+'</div>';
    html += '<input type="number" class="stock-input" id="prod-'+p.id+'" placeholder="+Stock">';
    html += '<input type="number" class="price-input" id="price-'+p.id+'" value="'+p.price+'">';
    html += '<div class="btn-group">';
    html += '<button class="btn-production" onclick="addProduction('+p.id+')">+Stock</button>';
    html += '<button class="btn-price" onclick="updatePrice('+p.id+')">₱Price</button>';
    html += '</div></div>';
  }
  document.getElementById('productionList').innerHTML = html;
}

function addProduction(id){
  var input = document.getElementById('prod-'+id);
  var addQty = parseInt(input.value)||0;
  if(addQty<=0){alert('Enter valid quantity!');return}
  for(var i=0;i<products.length;i++){
    if(products[i].id===id){
      products[i].stock += addQty;
      break;
    }
  }
  saveData();
  renderProduction();
  input.value = '';
}

function updatePrice(id){
  var input = document.getElementById('price-'+id);
  var newPrice = parseFloat(input.value);
  if(isNaN(newPrice) || newPrice<0){alert('Enter valid price!');return}
  for(var i=0;i<products.length;i++){
    if(products[i].id===id){
      products[i].price = newPrice;
      break;
    }
  }
  saveData();
  renderProduction();
  alert('Price updated to ₱'+newPrice);
}

function populateProductDropdown(){
  var select = document.getElementById('prodProduct');
  select.innerHTML = '<option value="">Select Product</option>';
  for(var i=0;i<products.length;i++){
    select.innerHTML += '<option value="'+products[i].id+'">'+products[i].name+'</option>';
  }
  document.getElementById('prodDate').valueAsDate = new Date();
}

function addProductionLog(){
  var date = document.getElementById('prodDate').value;
  var productId = parseInt(document.getElementById('prodProduct').value);
  var qty = parseInt(document.getElementById('prodQty').value)||0;
  var waste = parseInt(document.getElementById('prodWaste').value)||0;
  var wrapper = parseInt(document.getElementById('prodWrapper').value)||0;
  var desc = document.getElementById('prodDesc').value.trim();

  if(!date ||!productId || qty<=0){
    alert('Fill Date, Product, and Qty Produced!');
    return;
  }

  var product = null;
  for(var i=0;i<products.length;i++){
    if(products[i].id===productId){product=products[i];break;}
  }

  productionLogs.unshift({
    id:Date.now(),
    date:date,
    productId:productId,
    productName:product.name,
    qty:qty,
    waste:waste,
    wrapper:wrapper,
    desc:desc
  });

  // WASTE = GRAMS LANG, HINDI BAWAS SA STOCK
  product.stock += qty;

  saveData();
  renderProduction();
  renderProductionLogs();

  document.getElementById('prodQty').value='';
  document.getElementById('prodWaste').value='';
  document.getElementById('prodWrapper').value='';
  document.getElementById('prodDesc').value='';
  alert('Production logged! +'+qty+' added to '+product.name+' stock');
}

function renderProductionLogs(){
  var html = '';
  var today = new Date().toISOString().split('T')[0];
  var todayLogs = productionLogs.filter(log => log.date === today);

  if(todayLogs.length===0){
    html = '<div style="font-size:11px;color:#999;text-align:center;">No production today</div>';
  } else {
    for(var i=0;i<todayLogs.length;i++){
      var log = todayLogs[i];
      html += '<div class="log-item">';
      html += '<div class="log-item-name">'+log.productName+' - '+log.qty+'pcs';
      if(log.waste>0) html += ' <span class="waste-text">(waste: '+log.waste+' grams)</span>';
      if(log.wrapper>0) html += ' <span class="wrapper-text">[wrapper: '+log.wrapper+' grams]</span>';
      html += '</div>';
      if(log.desc) html += '<div style="color:#666;font-size:10px;">'+log.desc+'</div>';
      html += '</div>';
    }
  }
  document.getElementById('productionLogsList').innerHTML = html;
}

function resetDay(){
  if(confirm('Reset logs?')){
    productionLogs = [];
    saveData();
    renderProductionLogs();
  }
}

// AUTO RUN EVERYTHING
renderProduction();
populateProductDropdown();
renderProductionLogs();
</script>
</body>
</html>
